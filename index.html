        ::-webkit-scrollbar { width: 6px; }

        messages.sort((a, b) => new Date(a.time) - new Date(b.time));

        // ====== 渲染函数 ======
        function buildCalendar() {
            const events = messages.filter(m => m.type === 'event' || !m.type);
            const studies = messages.filter(m => m.type === 'study');
            
            // 近期高亮
            let html = '<div class="section-title" style="border-bottom-color:#c53030;">🔰 近期重点</div>';
            html += '<div class="msg-item" style="border-left-color:#c53030;background:#fff5f5;">' +
                '<div><span class="msg-sender" style="color:#c53030;">📌 6月11日-15日 晚间7:15-8:15</span></div>' +
                '<div class="msg-text"><strong>群聊机器人·群消息汇总</strong> — 每日 AI 自动抓取总结</div></div>';
            
            html += '<div class="section-title">📅 群聊日历</div>';
            html += '<table><tr><th style="width:120px;">日期</th><th>事件/学习</th><th>消息数</th></tr>';
            
            const calMap = {};
            messages.forEach(m => {
                const d = m.time.slice(0, 10);
                if (!calMap[d]) calMap[d] = { events: 0, studies: 0, total: 0 };
                calMap[d].total++;
                if (m.type === 'study') calMap[d].studies++;
                else calMap[d].events++;
            });
            
            Object.keys(calMap).sort().forEach(d => {
                const c = calMap[d];
                const isSoon = d >= '2026-06-14' && d <= '2026-06-20';
                const dateDisplay = d.slice(5);
                html += '<tr' + (isSoon ? ' style="background:#fffbeb;font-weight:600;color:#d97706;"' : '') + '>' +
                    '<td' + (isSoon ? ' style="font-weight:600;color:#d97706;"' : '') + '>' + dateDisplay + '</td>' +
                    '<td>' + c.events + ' 个事件 / ' + c.studies + ' 个学习</td>' +
                    '<td>' + c.total + ' 条</td></tr>';
            });
            html += '</table>';
            return html;
        }

        function buildStudy() {
            const items = messages.filter(m => m.type === 'study');
            let html = '<div class="section-title">📚 学习计划</div>';
            if (items.length === 0) {
                html += '<p class="empty-tip">暂无学习计划</p>';
            } else {
                items.forEach(m => {
                    html += '<div class="msg-item" style="border-left-color:#c53030;">' +
                        '<div><span class="msg-sender">' + m.sender + '</span><span class="msg-time">' + m.time.slice(0, 16).replace('T', ' ') + '</span></div>' +
                        '<div class="msg-text">' + (m.text || '').replace(/\n/g, '<br>') + '</div></div>';
                });
            }
            return html;
        }

        function buildEvents() {
            const items = messages.filter(m => m.type === 'event' || !m.type);
            let html = '<div class="section-title">🎪 群聊事件中</div>';
            if (items.length === 0) {
                html += '<p class="empty-tip">暂无事件</p>';
            } else {
                items.forEach(m => {
                    const date = new Date(m.time);
                    const today = new Date();
                    const diffDays = Math.floor((today - date) / (1000*60*60*24));
                    html += '<div class="msg-item"' + (diffDays <= 7 ? ' style="border-left-color:#d97706;background:#fffbeb;"' : '') + '>' +
                        '<div><span class="msg-sender">' + m.sender + '</span><span class="msg-time">' + m.time.slice(0, 16).replace('T', ' ') + '</span>' +
                        (diffDays <= 7 ? ' <span class="tag tag-red">近期</span>' : '') +
                        '</div><div class="msg-text">' + (m.text || '').replace(/\n/g, '<br>') + '</div></div>';
                });
            }
            return html;
        }

        function buildPastevents() {
            let html = '<div class="section-title">🗋 过往群聊</div>';
            const items = messages.filter(m => m.type === 'past' || m.type === undefined);
            // 按事件分组
            html += '<p class="empty-tip">历史消息自动归档中...</p>';
            return html;
        }

        function buildRaw() {
            let html = '<div class="section-title">📜 原始群聊</div>';
            const reversed = [...messages].reverse();
            reversed.forEach(m => {
                html += '<div class="msg-item">' +
                    '<div><span class="msg-sender">' + m.sender + '</span><span class="msg-time">' + m.time.slice(0, 16).replace('T', ' ') + '</span></div>' +
                    '<div class="msg-text">' + (m.text || '').replace(/\n/g, '<br>') + '</div></div>';
            });
            return html;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-tab="' + tab + '"]').classList.add('active');
            const content = document.getElementById('summaryContent');
            switch(tab) {
                case 'calendar': content.innerHTML = buildCalendar(); break;
                case 'study': content.innerHTML = buildStudy(); break;
                case 'events': content.innerHTML = buildEvents(); break;
                case 'pastevents': content.innerHTML = buildPastevents(); break;
                case 'raw': content.innerHTML = buildRaw(); break;
            }
        }

        // 默认显示日历
        switchTab('calendar');
    </script>
