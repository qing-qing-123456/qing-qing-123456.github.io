            html += '<li><strong>消息活跃时段：</strong> 5月中旬为活动通知高峰期（大地彩绘、朗诵、排球赛等），6月上旬转入学习提醒模式（军事理论、四级、认证考试）。</li>';
            html += '<li><strong>主要信息源：</strong> 「啓」承担了绝大部分活动/比赛通知（占消息总数约 ' + Math.round(sender啓/total*100) + '%），是班级信息中枢。</li>';
            html += '<li><strong>时效性提示：</strong> 当前所有消息均为已过期/已结束事件，建议通知群内同学关注下学期初的选课和活动通知。</li>';
            html += '<li><strong>机器人状态：</strong> NapCat QQ Bot 近期未记录到新的群消息。如需持续追踪，建议确保 NapCat 保持在线运行。</li>';
            html += '</ul>';

            html += '<p style="margin-top:20px;color:#999;font-size:12px;text-align:center;">🤖 AI 自动分析 · 生成时间 2026-06-26 · 由 deepseek-chat 驱动</p>';
            return html;
        }

        function buildCalendar() {
            // 待办事项（置顶）
            const now = new Date();
            const todayStr = now.toISOString().slice(0,10);
            
            let html = '<div class="section-title" style="border-bottom-color:#c53030;">⏰ 待办事项</div>';
            html += '<div class="info-box urgent" style="margin:6px 0;">' +
                '<strong>📌 6月16日-6月20日 · 军事理论期末考</strong><br>' +
                '<span style="color:#555;">知到（智慧树）军事理论课考试 — 6月15日已截止刷课，6.16-6.20期末考试！</span></div>';
            
            // 活动日历
            let items = messages.filter(m => m.type === 'event' || m.type === 'study');
            let cal = [];
            items.forEach(m => {
                const dateStr = (m.time||'').slice(0,10);
                let label = m.text.replace(/<br>/g, ' ').replace(/@all|@全体成员/g,'').trim().slice(0, 40);
                if (label.includes('军事理论') || label.includes('知到')) label = '军事理论刷课/考试（6.15截止刷课）';
                if (label.includes('四级') || label.includes('准考证')) label = '四级准考证打印';
                if (label.includes('学生证补办')) label = '学生证补办（已截止6.10）';
                if (label.includes('大地彩绘')) label = '大地彩绘活动（5.16浮山海月广场）';
                if (label.includes('AI智能体')) label = 'AI智能体创新大赛决赛';
                if (label.includes('朗诵')) label = '五四朗诵比赛（5.14截止报名）';
                if (label.includes('家乡')) label = '家乡主题摄影公益活动（5.13-5.22）';
                if (label.includes('排球')) label = '校排球赛（5.28开赛）';
                if (label.includes('健康跑')) label = '校园健康跑（5.23比赛）';
                if (label.includes('绘画')) label = '绘画解压活动（5.21博知楼511）';
                if (label.includes('学生会')) label = '学生会竞选（5.28截止报名）';
                if (label.includes('艺术展演')) label = '大学生艺术展演选拔';
                if (label.includes('进社区')) label = '进社区案例征集（5.31截止）';
                if (label.includes('蒲公英')) label = '蒲公英人才计划（华为认证）';
                if (label.includes('XCTF')) label = 'XCTF AI+安全选拔赛';
                cal.push({ date: dateStr, label: label });
            });
            cal.sort((a, b) => a.date.localeCompare(b.date));

            html += '<div class="section-title">📅 活动日历</div>';
            html += '<table><tr><th style="width:120px;">日期</th><th>活动/事项</th></tr>';
            cal.forEach(c => {
                const isSoon = c.date >= '2026-06-14' && c.date <= '2026-06-20';
                html += '<tr' + (isSoon ? ' style="background:#fffbe6;"' : '') + '>' +
                    '<td' + (isSoon ? ' style="font-weight:600;color:#d97706;"' : '') + '>' + c.date.slice(5) + '</td>' +
                    '<td>' + c.label + '</td></tr>';
            });
            html += '</table>';
            return html;
        }

        function buildStudy() {
            let items = messages.filter(m => m.type === 'study');
            let html = '<div class="section-title">📚 学业通知</div>';
            items.forEach(m => {
                html += '<div class="msg-item" style="border-left-color:#c53030;">' +
                    '<div><span class="msg-sender">' + m.sender + '</span><span class="msg-time">' + (m.time||'').slice(0, 16).replace('T', ' ') + '</span></div>' +
                    '<div class="msg-text">' + (m.text||'').replace(/\n/g, '<br>') + '</div></div>';
            });
            return html;
        }

        function buildEvents() {
            let items = messages.filter(m => m.type === 'event' && (m.time||'').substring(0,10) >= '2026-06-10');
            let html = '<div class="section-title">🎪 活动进行中</div>';
            if (items.length === 0) {
                html += '<p class="empty-tip">暂无进行中的活动</p>';
            } else {
                items.forEach(m => {
                    html += '<div class="msg-item" style="border-left-color:#6b3fa0;">' +
                        '<div><span class="msg-sender">' + m.sender + '</span><span class="msg-time">' + (m.time||'').slice(0, 16).replace('T', ' ') + '</span><span class="tag tag-green">进行中</span></div>' +
                        '<div class="msg-text">' + (m.text||'').replace(/\n/g, '<br>') + '</div></div>';
                });
            }
            return html;
        }

        function buildPastEvents() {
            let items = messages.filter(m => m.type === 'event' && (m.time||'').substring(0,10) < '2026-06-10');
            let html = '<div class="section-title">📋 过往活动</div>';
            if (items.length === 0) {
                html += '<p class="empty-tip">暂无过往活动</p>';
            } else {
                items.forEach(m => {
                    html += '<div class="msg-item" style="border-left-color:#888;">' +
                        '<div><span class="msg-sender">' + m.sender + '</span><span class="msg-time">' + (m.time||'').slice(0, 16).replace('T', ' ') + '</span><span class="tag">已结束</span></div>' +
                        '<div class="msg-text">' + (m.text||'').replace(/\n/g, '<br>') + '</div></div>';
                });
            }
            return html;
        }

        function buildTimetable() {
            let html = '<div class="section-title">🗓 本周课表（6.15 - 6.21）</div>';
            
            // 时间说明
            html += '<div class="stat-row">';
            html += '<div class="stat-card"><div class="num">' + timetable.length + '</div><div class="label">上课天数</div></div>';
            const totalSlots = timetable.reduce((sum, d) => sum + d.slots.length, 0);
            html += '<div class="stat-card"><div class="num">' + totalSlots + '</div><div class="label">课程节次</div></div>';
            html += '</div>';
            
            // 节次说明
            html += '<div class="sub-title">⏰ 节次说明</div>';
            html += '<div style="font-size:12px;color:#888;margin-bottom:12px;line-height:1.6;">';
            html += '1、2节(08:00-09:50) | 3、4节(10:10-12:00) | 5、6节(14:00-15:50)<br>';
            html += '7、8节(16:10-18:00) | 9、10节(18:30-20:20) | 11节(20:30-21:15)';
            html += '</div>';
            
            // 获取今天日期用于判断
            const nowDate = new Date();
            const todayMD = (nowDate.getMonth()+1) + '.' + nowDate.getDate();
            
            timetable.forEach(d => {
                const isToday = d.day.includes(todayMD);
                html += '<div class="section-title"' + (isToday ? ' style="border-bottom-color:#c53030;"' : '') + '>' + d.day + '</div>';
                
                d.slots.forEach(s => {
                    const periodInfo = periodMap[s.period] || s.period;
                    // 判断当前节次是否正在进行中（上课中或即将上）
                const hour = nowDate.getHours();
                const minute = nowDate.getMinutes();
                let isNow = false;
                if (s.period === '1-2节' && isToday && hour >= 8 && hour < 10) isNow = true;
                else if (s.period === '3-4节' && isToday && hour >= 10 && hour < 12) isNow = true;
                else if (s.period === '5-6节' && isToday && hour >= 14 && hour < 16) isNow = true;
                else if (s.period === '7-8节' && isToday && hour >= 16 && hour < 18) isNow = true;
                else if (s.period === '11节' && isToday && hour >= 20 && hour < 22) isNow = true;
                html += '<div class="msg-item"' + (isNow ? ' style="border-left-color:#c53030;background:#fff5f5;"' : '') + '>' +
                        '<div><span class="msg-sender">' + s.period + '</span><span class="msg-time">' + periodInfo + '</span></div>' +
                        '<div class="msg-text"><strong>' + s.course + '</strong>' + (s.room ? ' @ ' + s.room : '') + '</div></div>';
                });
            });
            return html;
        }

        function buildRaw() {
            let html = '<div class="section-title">📜 原始消息</div>';
            messages.forEach(m => {
                var tagClass = m.type === 'study' ? 'tag-red' : 'tag-purple';
                var tagText = m.type === 'study' ? '学业' : '活动';
                html += '<div class="msg-item">' +
                    '<div><span class="msg-sender">' + m.sender + '</span><span class="msg-time">' + (m.time||'').slice(0, 16).replace('T', ' ') + '</span><span class="tag ' + tagClass + '">' + tagText + '</span></div>' +
                    '<div class="msg-text">' + (m.text||'').replace(/\n/g, '<br>') + '</div></div>';
            });
            return html;
        }

        // ===== 标签切换 =====
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
            document.querySelector('[data-tab="' + tab + '"]').classList.add('active');
            var content = document.getElementById('summaryContent');
            switch(tab) {
                case 'ai': content.innerHTML = buildAI(); break;
                case 'calendar': content.innerHTML = buildCalendar(); break;
                case 'study': content.innerHTML = buildStudy(); break;
                case 'events': content.innerHTML = buildEvents(); break;
                case 'pastevents': content.innerHTML = buildPastEvents(); break;
                case 'timetable': content.innerHTML = buildTimetable(); break;
                case 'raw': content.innerHTML = buildRaw(); break;
            }
        }

        window.addEventListener('load', function() { switchTab('ai'); });
    </script>
</body>
</html>
