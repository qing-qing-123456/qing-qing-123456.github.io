        function buildCalendar() {
            const calMap = {};
            messages.forEach(m => {
                const d = m.time.slice(0, 10);
                if (!calMap[d]) calMap[d] = { events: 0, studies: 0, total: 0 };
                calMap[d].total++;
                if (m.type === 'study') calMap[d].studies++;
                else calMap[d].events++;
            });
            const dates = Object.keys(calMap).sort();
            const total = messages.length;
            const evt = messages.filter(m => m.type === 'event').length;
            const std = messages.filter(m => m.type === 'study').length;

            let html = '<div class="section-title">📮 群聊日历</div>';
            html += '<div class="stat-row">';
            html += '<div class="stat-card"><div class="num">' + total + '</div><div class="label">总消息数</div></div>';
            html += '<div class="stat-card"><div class="num">' + evt + '</div><div class="label">📙 事件</div></div>';

            html += '<table><tr><th>日期</th><th>事件/学习</th><th>消息数</th></tr>';
            dates.forEach(d => {
                const c = calMap[d];
                html += '<tr><td>' + d.slice(5) + '</td><td>' + c.events + ' 个事件 / ' + c.studies + ' 个学习</td><td>' + c.total + ' 条</td></tr>';
            });
            html += '</table>';
            return html;
        }

        function buildStudy() {
            const items = messages.filter(m => m.type === 'study');

            if (items.length === 0) { html += '<p class="empty-tip">暂无学习计划</p>'; return html; }

                html += '<div class="msg-item" style="border-left-color:#0f7b3e;">' +

                    '<div class="msg-text">' + (m.text||'').replace(/</g,'&lt;').replace(/\\n/g,'<br>') + '</div></div>';
            });
            return html;
        }

        function buildEvents() {
            const items = messages.filter(m => m.type === 'event');
            let html = '<div class="section-title">🎾 群聊事件与通知</div>';
            if (items.length === 0) { html += '<p class="empty-tip">暂无事件</p>'; return html; }
            items.forEach(m => {
                const diffDays = Math.floor((new Date() - new Date(m.time)) / (1000*60*60*24));
                html += '<div class="msg-item"' + (diffDays <= 7 ? ' style="border-left-color:#d97706;background:#fffbeb;"' : '') + '>' +

            });
            return html;
        }

        function buildRaw() {
            let html = '<div class="section-title">📐 原始群聊（按时间倒序）</div>';
            const reversed = [...messages].reverse();
            reversed.forEach(m => {
                const typeClass = m.type === 'study' ? 'tag-green' : 'tag-purple';

                html += '<div class="msg-item">' +

                    '<div class="msg-text">' + (m.text||'').replace(/</g,'&lt;').replace(/\\n/g,'<br>') + '</div></div>';
            });
            return html;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-tab="' + tab + '"]').classList.add('active');
            const content = document.getElementById('summaryContent');
            switch(tab) {
                case 'summary': content.innerHTML = buildSummary(); break;
                case 'calendar': content.innerHTML = buildCalendar(); break;
                case 'study': content.innerHTML = buildStudy(); break;
                case 'events': content.innerHTML = buildEvents(); break;
                case 'raw': content.innerHTML = buildRaw(); break;
            }
