        function buildCalendar() {
            let html = '<div class="section-title">📅 群聊日历</div>';
            html += '<table><tr><th style="width:120px;">日期</th><th>事件/学习</th><th>消息数</th></tr>';
            
            const calMap = {};
            messages.forEach(m => {
                const d = (m.time || '').slice(0, 10);
                if (!d) return;
                if (!calMap[d]) calMap[d] = { events: 0, studies: 0, total: 0 };
                calMap[d].total++;
                if (m.type === 'study') calMap[d].studies++;
                else calMap[d].events++;
            });
            
            const sortedDates = Object.keys(calMap).sort();
            sortedDates.forEach(d => {
                const c = calMap[d];
                const dateDisplay = d.slice(5);
                html += '<tr>' +
                    '<td>' + dateDisplay + '</td>' +
                    '<td>' + c.events + ' 个事件 / ' + c.studies + ' 个学习</td>' +
                    '<td>' + c.total + ' 条</td></tr>';
            });
            html += '</table>';

            html += '<div class="stat-row">';

            html += '<div class="stat-card"><div class="num">' + uniqueSenders + '</div><div class="label">发言人数</div></div>';
            html += '</div>';
            return html;
        }

        function buildStudy() {
            const items = messages.filter(m => m.type === 'study');

                html += '<p class="empty-tip">暂无学习计划消息</p>';
            } else {
                items.forEach(m => {
                    const safeText = (m.text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    html += '<div class="msg-item" style="border-left-color:#0f7b3e;">' +

            }
            return html;

                html += '<p class="empty-tip">暂无事件通知</p>';

                items.forEach(m => {

                        '<div class="msg-text">' + safeText.replace(/\n/g, '<br>') + '</div></div>';

            }
            return html;
        }

        function buildRaw() {
            let html = '<div class="section-title">📜 原始群聊（按时间倒序）</div>';
            const reversed = [...messages].reverse();
            reversed.forEach(m => {
                const safeText = (m.text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            });
            return html;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-tab="' + tab + '"]').classList.add('active');
            const content = document.getElementById('summaryContent');
            switch(tab) {
                case 'ai': content.innerHTML = buildAI(); break;
                case 'calendar': content.innerHTML = buildCalendar(); break;
                case 'study': content.innerHTML = buildStudy(); break;
                case 'events': content.innerHTML = buildEvents(); break;
                case 'raw': content.innerHTML = buildRaw(); break;
                default: content.innerHTML = buildAI(); break;
            }
        }
