                    '<td' + (isSoon ? ' style="font-weight:600;color:#d97706;"' : '') + '>' + dateDisplay + '</td>' +
                    '<td>' + c.events + ' 个事件 / ' + c.studies + ' 个学习</td>' +
                    '<td>' + c.total + ' 条</td></tr>';
            });
            html += '</table>';
            return html;
        }

        function buildStudy() {
            const items = messages.filter(m => m.type === 'study');
            let html = '<div class="section-title">📚 学习计划</div>';
            if (items.length === 0) {
                html += '<p class="empty-tip">暂无学习计划</p>';
            } else {
                // 按紧急程度分组
                const urgent = items.filter(m => m.text.includes('截止') || m.text.includes('交') || m.text.includes('考试'));
                const normal = items.filter(m => !urgent.includes(m));
                
                if (urgent.length > 0) {
                    html += '<div class="deadline-warning"><div class="title">⏰ 待办提醒</div>';
                    urgent.forEach(m => {
                        html += '<div class="msg-item" style="border-left-color:#dc2626;background:#fef2f2;">' +
                            '<div><span class="msg-sender" style="color:#dc2626;">' + m.sender + '</span><span class="msg-time">' + formatTime(m.time) + '</span></div>' +
                            '<div class="msg-text">' + escapeHtml(m.text) + '</div></div>';
                    });
                    html += '</div>';
                }
                
                html += '<div class="section-title" style="font-size:15px;border-bottom-color:#0f7b3e;">📋 所有学习相关</div>';
                items.forEach(m => {
                    html += '<div class="msg-item" style="border-left-color:#c53030;">' +
                        '<div><span class="msg-sender">' + m.sender + '</span><span class="msg-time">' + formatTime(m.time) + '</span></div>' +
                        '<div class="msg-text">' + escapeHtml(m.text) + '</div></div>';
                });
            }
            return html;
        }

        function buildEvents() {
            const items = messages.filter(m => m.type === 'event' || !m.type);
            let html = '<div class="section-title">🎪 群聊事件</div>';
            if (items.length === 0) {
                html += '<p class="empty-tip">暂无事件</p>';
            } else {
                // 近期 vs 历史
                const recent = items.filter(m => {
                    const d = new Date(m.time);
                    const now = new Date();
                    return (now - d) < 7 * 24 * 60 * 60 * 1000 && m.time.startsWith('2026-06');
                });
                const past = items.filter(m => !recent.includes(m));
                
                if (recent.length > 0) {
                    html += '<div class="section-title" style="font-size:15px;border-bottom-color:#d97706;">🔥 近期事件（本周）</div>';
                    recent.forEach(m => {
                        html += '<div class="msg-item" style="border-left-color:#d97706;background:#fffbeb;">' +
                            '<div><span class="msg-sender">' + m.sender + '</span><span class="msg-time">' + formatTime(m.time) + '</span>' +
                            ' <span class="tag tag-red">近期</span></div>' +
                            '<div class="msg-text">' + escapeHtml(m.text) + '</div></div>';
                    });
                }
                
                html += '<div class="section-title" style="font-size:15px;border-bottom-color:#6b3fa0;">📦 历史事件</div>';
                past.forEach(m => {
                    html += '<div class="msg-item">' +
                        '<div><span class="msg-sender">' + m.sender + '</span><span class="msg-time">' + formatTime(m.time) + '</span>' +
                        ' <span class="tag tag-purple">历史</span></div>' +
                        '<div class="msg-text">' + escapeHtml(m.text) + '</div></div>';
                });
            }
            return html;
        }

        function buildRaw() {
            let html = '<div class="section-title">📜 原始群聊 · 全部消息</div>';
            html += '<p style="color:#888;font-size:13px;margin-bottom:10px;">共 ' + messages.length + ' 条消息，按时间倒序排列</p>';
            const reversed = [...messages].reverse();
            reversed.forEach(m => {
                const typeLabel = m.type === 'study' ? ' <span class="tag tag-green">学习</span>' : (m.type === 'event' ? ' <span class="tag tag-purple">事件</span>' : '');
                html += '<div class="msg-item">' +
                    '<div><span class="msg-sender">' + m.sender + '</span><span class="msg-time">' + formatTime(m.time) + '</span>' + typeLabel + '</div>' +
                    '<div class="msg-text">' + escapeHtml(m.text) + '</div></div>';
            });
            return html;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-tab="' + tab + '"]').classList.add('active');
            const content = document.getElementById('summaryContent');
            switch(tab) {
                case 'ai': content.innerHTML = buildAI(); break;
                case 'calendar': content.innerHTML = buildCalendar(); break;
                case 'study': content.innerHTML = buildStudy(); break;
                case 'events': content.innerHTML = buildEvents(); break;
                case 'raw': content.innerHTML = buildRaw(); break;
            }
        }

        // 默认显示 AI 总结
        switchTab('ai');
    </script>
</body>
</html>
